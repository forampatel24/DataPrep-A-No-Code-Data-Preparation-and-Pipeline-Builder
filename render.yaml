services:
  - type: web
    name: cleanslate
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn cleanslate.wsgi --log-file -
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        sync: false
      - key: USE_S3
        value: "True"
      - key: SUPABASE_S3_KEY
        sync: false
      - key: SUPABASE_S3_SECRET
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
      - key: SUPABASE_S3_ENDPOINT
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
