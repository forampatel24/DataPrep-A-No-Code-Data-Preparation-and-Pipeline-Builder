{% extends 'base.html' %}
{% block title %}Create Pipeline - DataPrep{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-4"><i class="bi bi-diagram-3 me-2"></i>Create Pipeline</h4>
                <p class="text-muted">Dataset: <strong>{{ dataset.original_name }}</strong></p>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="invalid-feedback d-block">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-plus-circle me-1"></i> Create Pipeline
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
